name: Random Cron

on:
  workflow_run:
    workflows: ["刷步数"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mimotion-persist-master
  cancel-in-progress: false

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: random cron
        run: |
          source cron_convert.sh
          echo "configed CRON_HOURS ${{ vars.CRON_HOURS }}"
          persist_execute_log ${{ github.event_name }} ${{ vars.CRON_HOURS }}
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          if git diff --cached --quiet; then
            echo "No cron changes to persist"
            exit 0
          fi
          current=`TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S'`
          for attempt in 1 2 3; do
            git fetch origin master
            git reset --soft origin/master
            if git diff --cached --quiet; then
              echo "Changes already present on remote"
              exit 0
            fi
            git commit -m "[${current}] random cron trigger by ${{ github.event_name }}"
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push raced with another update; retrying"
            sleep $((attempt * 2))
          done
          exit 1

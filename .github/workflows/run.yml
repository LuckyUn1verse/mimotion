name: 刷步数

on:
  schedule:
    - cron: '33 0,1,2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mimotion-persist-master
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y

      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 开始
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          if git diff --cached --quiet; then
            echo "No token changes to persist"
            exit 0
          fi
          for attempt in 1 2 3; do
            git fetch origin master
            git reset --soft origin/master
            if git diff --cached --quiet; then
              echo "Changes already present on remote"
              exit 0
            fi
            git commit -m "persist tokens trigger by ${{ github.event_name }}"
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push raced with another update; retrying"
            sleep $((attempt * 2))
          done
          exit 1
